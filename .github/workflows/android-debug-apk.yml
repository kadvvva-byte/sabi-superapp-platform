name: Owner Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/android-debug-apk.yml"

jobs:
  android-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install dependencies
        working-directory: mobile
        run: |
          if [ -f package-lock.json ]; then
            npm ci --legacy-peer-deps
          else
            npm install --legacy-peer-deps
          fi

      - name: Restore Android google-services.json
        run: |
          if [ -z "${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_B64 }}" ]; then
            echo "ANDROID_GOOGLE_SERVICES_JSON_B64 secret is missing"
            exit 1
          fi
          echo "${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_B64 }}" | base64 --decode > mobile/android/app/google-services.json
          test -f mobile/android/app/google-services.json

      - name: Generate Android debug keystore
        run: |
          keytool -genkeypair -v \
            -storetype JKS \
            -keystore mobile/android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          test -f mobile/android/app/debug.keystore

      - name: Build debug APK
        working-directory: mobile/android
        env:
          EXPO_PUBLIC_AUTH_API_BASE_URL: http://192.168.0.101:4001
          EXPO_PUBLIC_API_BASE_URL: http://192.168.0.101:4001
          GRADLE_OPTS: -Dorg.gradle.workers.max=2 -Dorg.gradle.parallel=false -Dkotlin.compiler.execution.strategy=in-process
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --no-daemon --max-workers=2 -Dkotlin.compiler.execution.strategy=in-process

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sabi-superapp-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
