name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE_URL: "http://178.154.210.119"
      EXPO_PUBLIC_AUTH_API_BASE_URL: "http://178.154.210.119"
      EXPO_PUBLIC_QR_API_BASE_URL: "http://178.154.210.119"
      EXPO_PUBLIC_SOCKET_BASE_URL: "http://178.154.210.119"
      EXPO_PUBLIC_SOCKET_PATH: "/socket.io"
      EXPO_PUBLIC_API_PORT: "80"
      EXPO_PUBLIC_ALLOW_NATIVE_LOOPBACK: "0"
      EAS_NO_VCS: "0"
      EAS_SKIP_AUTO_FINGERPRINT: "1"
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit -p tsconfig.json

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Build APK on GitHub runner
        run: eas build --platform android --profile preview --local --non-interactive --output ./sabi-preview.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sabi-preview-apk
          path: ./sabi-preview.apk
          if-no-files-found: error
