name: Android Dev Client APK

on:
  workflow_dispatch:

jobs:
  build-dev-client-apk:
    name: Build Android Expo Dev Client APK
    runs-on: ubuntu-latest

    env:
      NODE_ENV: development
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EXPO_PUBLIC_API_BASE_URL: http://178.154.210.119
      EXPO_PUBLIC_AUTH_API_BASE_URL: http://178.154.210.119
      EXPO_PUBLIC_QR_API_BASE_URL: http://178.154.210.119

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify expo-dev-client is installed
        run: node -e "require.resolve('expo-dev-client/package.json'); console.log('expo-dev-client OK')"

      - name: Verify EAS development profile
        run: node -e "const eas=require('./eas.json'); const p=eas.build&&eas.build.development; if(!p||p.developmentClient!==true||p.android?.buildType!=='apk'){ console.error(JSON.stringify(p,null,2)); process.exit(1); } console.log('developmentClient APK profile OK')"

      - name: TypeScript check
        run: npx tsc --noEmit -p tsconfig.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android DEV CLIENT APK
        run: eas build --platform android --profile development --non-interactive --wait
