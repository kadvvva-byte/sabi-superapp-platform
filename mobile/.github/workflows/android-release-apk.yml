name: Android Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android-release-apk:
    name: Build Android Release APK
    runs-on: ubuntu-latest

    env:
      NODE_ENV: production
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EXPO_PUBLIC_API_BASE_URL: http://178.154.210.119
      EXPO_PUBLIC_AUTH_API_BASE_URL: http://178.154.210.119
      EXPO_PUBLIC_QR_API_BASE_URL: http://178.154.210.119
      EXPO_PUBLIC_SOCKET_BASE_URL: http://178.154.210.119
      EXPO_PUBLIC_SOCKET_PATH: /socket.io
      EXPO_PUBLIC_API_PORT: "80"
      EXPO_PUBLIC_ALLOW_NATIVE_LOOPBACK: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write production Expo env
        run: |
          cat > .env.local <<'EOF'
          EXPO_PUBLIC_API_BASE_URL=http://178.154.210.119
          EXPO_PUBLIC_AUTH_API_BASE_URL=http://178.154.210.119
          EXPO_PUBLIC_QR_API_BASE_URL=http://178.154.210.119
          EXPO_PUBLIC_SOCKET_BASE_URL=http://178.154.210.119
          EXPO_PUBLIC_SOCKET_PATH=/socket.io
          EXPO_PUBLIC_API_PORT=80
          EXPO_PUBLIC_ALLOW_NATIVE_LOOPBACK=0
          EOF
          cp .env.local .env.production

      - name: TypeScript check
        run: npx tsc --noEmit -p tsconfig.json

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Generate month-test release keystore
        run: |
          keytool -genkeypair \
            -v \
            -storetype JKS \
            -keystore android/app/sabi-release.keystore \
            -alias sabi-release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "SabiReleaseStore2026!" \
            -keypass "SabiReleaseKey2026!" \
            -dname "CN=Sabi SuperApp Month Test, OU=Sabi, O=Sabi, L=Tashkent, S=Tashkent, C=UZ"

      - name: Configure release signing
        run: |
          node <<'NODE'
          const fs = require("fs");

          const path = "android/app/build.gradle";
          let c = fs.readFileSync(path, "utf8");

          if (!c.includes("sabiRelease {")) {
            c = c.replace(
              /signingConfigs\s*\{/,
              `signingConfigs {
                  sabiRelease {
                      storeFile file("sabi-release.keystore")
                      storePassword "SabiReleaseStore2026!"
                      keyAlias "sabi-release"
                      keyPassword "SabiReleaseKey2026!"
                  }`
            );
          }

          c = c.replace(
            /release\s*\{([\s\S]*?)signingConfig signingConfigs\.debug/,
            "release {$1signingConfig signingConfigs.sabiRelease"
          );

          fs.writeFileSync(path, c);
          console.log("OK release signing configured");
          NODE

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          echo 'org.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=1536m -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError' >> gradle.properties
          echo 'org.gradle.daemon=false' >> gradle.properties
          echo 'org.gradle.parallel=false' >> gradle.properties
          echo 'org.gradle.workers.max=2' >> gradle.properties
          echo 'reactNativeArchitectures=arm64-v8a,armeabi-v7a' >> gradle.properties
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sabi-superapp-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30


